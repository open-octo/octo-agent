name: Desktop

# Builds the Wails desktop shell (cmd/octo-desktop, a nested module). macOS and
# Windows are the launch platforms (packaged artifacts); Linux is a compile
# probe only — it builds (installing WebKitGTK 4.1 + libsoup 3.0), proving the
# code is cross-platform, but Linux packaging/distribution stays deferred (the
# runtime webkit dependency is the open question). The main `Go` workflow's
# matrix does not build this module (nested go.mod, excluded from ./...), so the
# CLI's CGO-free, cross-platform matrix stays green independent of Wails.
on:
  push:
    branches: [main]
    paths:
      - 'cmd/octo-desktop/**'
      - 'internal/server/**'
      - 'scripts/package-desktop-macos.sh'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'cmd/octo-desktop/**'
      - 'internal/server/**'
      - 'scripts/package-desktop-macos.sh'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          # package-desktop-macos.sh derives the version from `git describe`;
          # fetch tags so it isn't just the short SHA.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: cmd/octo-desktop/go.sum

      # Linux webview toolchain (CGO): the build/vet steps below link against it.
      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev

      # The desktop app embeds the committed web UI (internal/server/webdist via
      # go:embed), so there's no frontend build step here.
      - name: go vet
        working-directory: cmd/octo-desktop
        run: go vet ./...

      - name: Build + package macOS Octo.app
        if: runner.os == 'macOS'
        run: bash scripts/package-desktop-macos.sh

      - name: Upload macOS app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Octo-macos
          path: Octo.app

      # Compile probe only — proves the code builds on Linux. No packaged
      # artifact yet (AppImage/.deb and the runtime webkit dependency are the
      # deferred parts of Linux support).
      - name: Build Linux binary (compile probe)
        if: runner.os == 'Linux'
        working-directory: cmd/octo-desktop
        run: go build -v -o /dev/null .

      - name: Build Windows binary
        if: runner.os == 'Windows'
        working-directory: cmd/octo-desktop
        run: go build -v -o octo-desktop.exe .

      # Raw .exe for now; wrapping it in an installer rides the existing Inno
      # Setup track (see windows-installer-check.yml), a separate change.
      - name: Upload Windows binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: octo-desktop-windows
          path: cmd/octo-desktop/octo-desktop.exe
