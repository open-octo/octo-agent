name: Desktop

# Builds the Wails desktop shell (cmd/octo-desktop, a nested module). macOS and
# Windows are the launch platforms; Linux builds an AppImage too (installing
# GTK4 + WebKitGTK 6.0 + libsoup 3.0). All three artifacts are build-verified
# in CI. The Linux AppImage relies on the host GTK4/WebKitGTK 6.0 (its AppRun
# preflights and guides the user if absent) and is not yet run-tested on a
# real desktop. The main `Go` workflow's
# matrix does not build this module (nested go.mod, excluded from ./...), so the
# CLI's CGO-free, cross-platform matrix stays green independent of Wails.
on:
  push:
    branches: [main]
    paths:
      - 'cmd/octo-desktop/**'
      - 'internal/server/**'
      - 'scripts/package-desktop-macos.sh'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'cmd/octo-desktop/**'
      - 'internal/server/**'
      - 'scripts/package-desktop-macos.sh'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          # package-desktop-macos.sh derives the version from `git describe`;
          # fetch tags so it isn't just the short SHA.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: cmd/octo-desktop/go.sum

      # Linux webview toolchain (CGO): the build/vet steps below link against it.
      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        # Wails v3 on Linux links GTK4 + WebKitGTK 6.0 (a newer stack than the
        # older webkit2gtk-4.1) plus libsoup 3.0.
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev

      # The desktop app embeds the committed web UI (internal/server/webdist via
      # go:embed), so there's no frontend build step here.
      - name: go vet
        working-directory: cmd/octo-desktop
        run: go vet ./...

      - name: Build + package macOS Octo.app
        if: runner.os == 'macOS'
        run: bash scripts/package-desktop-macos.sh

      - name: Upload macOS app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Octo-macos
          path: Octo.app

      # AppImage bundles the binary + AppRun launcher (which preflights the host
      # GTK4/WebKitGTK 6.0 libs — not bundled). Build-verified in CI; running it
      # still needs a real Linux desktop.
      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: bash scripts/package-desktop-linux.sh

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Octo-linux-appimage
          path: Octo-x86_64.AppImage

      - name: Build Windows binary
        if: runner.os == 'Windows'
        working-directory: cmd/octo-desktop
        run: go build -v -o octo-desktop.exe .

      # Raw .exe for now; wrapping it in an installer rides the existing Inno
      # Setup track (see windows-installer-check.yml), a separate change.
      - name: Upload Windows binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: octo-desktop-windows
          path: cmd/octo-desktop/octo-desktop.exe
