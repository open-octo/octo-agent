name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'docs/**'
      - 'blog/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege default; the deploy job elevates only what actions/deploy-pages needs.
permissions:
  contents: read

# One deployment in flight at a time — Pages deploys aren't safe to run concurrently.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build

      - name: Install blog dependencies
        working-directory: blog
        run: npm ci

      - name: Build blog site
        working-directory: blog
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Root: the hand-rolled landing page + install script, unchanged.
          cp landing/index.html landing/CNAME landing/install.sh landing/.nojekyll landing/robots.txt landing/og-image.svg _site/
          # /docs/*: the generated Starlight site (astro.config.mjs sets base: "/docs").
          mkdir -p _site/docs
          cp -r docs/dist/. _site/docs/
          # /blog/*: the generated Astro blog site (astro.config.mjs sets base: "/blog").
          mkdir -p _site/blog
          cp -r blog/dist/. _site/blog/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
