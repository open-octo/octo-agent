name: Go

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default: jobs only check out and build, no write access.
permissions:
  contents: read

# Run a fresh job per push to the same branch and cancel any in-flight one,
# saves CI minutes during rapid iteration.
concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  svelte-check:
    name: Svelte Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run svelte-check
        working-directory: web
        run: npx svelte-check --tsconfig ./tsconfig.json

  test:
    name: Go ${{ matrix.go }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        if: matrix.os != 'windows-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      # cmd/octo-desktop is a nested module replaced onto the root module, so a
      # root dependency bump can leave its go.mod untidy without any file under
      # cmd/octo-desktop changing (broke the 1.12.20 installers). tidy -diff is
      # module-graph-only — no CGO/GTK needed — so it runs here on every PR.
      - name: go mod tidy check (cmd/octo-desktop)
        if: matrix.os == 'ubuntu-latest'
        working-directory: cmd/octo-desktop
        run: go mod tidy -diff

      # Data races are OS-independent, so the detector only runs on ubuntu (where
      # it's cheapest). Windows/macOS run a plain `go test` — fast, and still
      # catches platform-specific failures (path handling, process spawning, the
      # GOOS-guarded cases). The race pass on Windows was the CI bottleneck
      # (~150s of a ~220s job) thanks to instrumentation + costly process spawns.
      - name: go test
        run: go test ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} ./...
