name: Go

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default: jobs only check out and build, no write access.
permissions:
  contents: read

# Run a fresh job per push to the same branch and cancel any in-flight one,
# saves CI minutes during rapid iteration.
concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go ${{ matrix.go }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
        env:
          # Opt into Node 24 early to silence deprecation warnings.
          # Both actions/checkout@v4 and actions/setup-go@v5 support it.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        if: matrix.os != 'windows-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      # Data races are OS-independent, so the detector only runs on ubuntu (where
      # it's cheapest). Windows/macOS run a plain `go test` — fast, and still
      # catches platform-specific failures (path handling, process spawning, the
      # GOOS-guarded cases). The race pass on Windows was the CI bottleneck
      # (~150s of a ~220s job) thanks to instrumentation + costly process spawns.
      - name: go test
        run: go test ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} ./...
