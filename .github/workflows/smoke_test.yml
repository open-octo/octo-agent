name: Smoke Tests

on:
  schedule:
    # Run every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  smoke:
    runs-on: ubuntu-latest
    name: Web Search Smoke Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Run smoke tests
        run: bundle exec rspec spec/integration/web_search_smoke_spec.rb --tag smoke --format documentation

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed — one or more search provider parsers may need updating."
          echo "::error::Re-capture fixtures and update the corresponding parse_* method in lib/clacky/tools/web_search.rb"
