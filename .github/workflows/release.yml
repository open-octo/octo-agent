name: Release

# Cut a release by pushing a SemVer tag:
#   git tag v0.5.0 && git push origin v0.5.0
# goreleaser then cross-compiles every target and publishes the GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release + upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so goreleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
        env:
          # Opt into Node 24 early to silence deprecation warnings.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          # -p 1 serializes builds: the per-target rg-embed hook writes a single
          # shared binaries/rg file, so parallel targets would clobber it.
          args: release --clean -p 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
