name: Release

# Cut a release by pushing a SemVer tag:
#   git tag v0.5.0 && git push origin v0.5.0
# goreleaser then cross-compiles every target and publishes the GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release + upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags so goreleaser can build the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          # -p 1 serializes builds: the per-target rg-embed hook writes a single
          # shared binaries/rg file, so parallel targets would clobber it.
          args: release --clean -p 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the double-click Windows installer (octo-setup.exe) from the binary
  # goreleaser just published, and attach it to the same release. Kept separate
  # from goreleaser because Inno Setup is a Windows-only toolchain. The MVP
  # installer is unsigned — see dev-docs/windows-onboarding-design.md.
  windows-installer:
    name: windows installer
    needs: goreleaser
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5 # for packaging/windows/octo.iss + LICENSE.txt

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: cmd/octo-desktop/go.sum

      - name: Stage the released binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          gh release download "${{ github.ref_name }}" --pattern "octo_${version}_windows_amd64.zip" --dir dl
          Expand-Archive -Path "dl\octo_${version}_windows_amd64.zip" -DestinationPath dl\extract -Force
          $exe = Get-ChildItem -Path dl\extract -Recurse -Filter octo.exe | Select-Object -First 1
          Copy-Item $exe.FullName staging\octo.exe
          Copy-Item LICENSE.txt staging\LICENSE.txt
          "version=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Build the desktop GUI (nested module; embeds the committed web UI).
      # -H windowsgui so no console window flashes behind the app.
      - name: Build desktop app
        shell: pwsh
        working-directory: cmd/octo-desktop
        run: go build -ldflags "-H windowsgui" -o ..\..\staging\octo-desktop.exe .

      # Fetches uv.exe from its upstream GitHub release so the installer can
      # bundle it — see octo.iss's [Files] section. Native PowerShell rather
      # than `make bundle-tools-windows` (which does the same fetch and is
      # kept for local/macOS/Linux dev use — see the Makefile):
      # windows-latest runners aren't guaranteed to have GNU Make, and this
      # avoids adding a `choco install make` dependency to the release
      # pipeline just for one curl+unzip call. The version here must be kept
      # in sync with UV_VERSION in the Makefile.
      - name: Fetch bundled uv
        shell: pwsh
        run: |
          $uvVersion = "0.11.26"
          New-Item -ItemType Directory -Force -Path dl\uv | Out-Null

          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/download/$uvVersion/uv-x86_64-pc-windows-msvc.zip" -OutFile dl\uv.zip
          Expand-Archive -Path dl\uv.zip -DestinationPath dl\uv -Force
          Copy-Item dl\uv\uv.exe staging\uv.exe

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y # not preinstalled on the runner image

      - name: Compile installer
        shell: pwsh
        run: |
          # Source paths in the .iss resolve relative to the script's own dir,
          # so SourceDir / OutputDir must be absolute.
          $staging = Join-Path $PWD 'staging'
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$env:version" "/DSourceDir=$staging" "/O$staging" `
            packaging\windows\octo.iss

      # Authenticode signing via SignPath Foundation (free for open source).
      # Dormant until SignPath is configured: set repo variables
      # SIGNPATH_ORGANIZATION_ID / SIGNPATH_PROJECT_SLUG /
      # SIGNPATH_SIGNING_POLICY_SLUG and the secret SIGNPATH_API_TOKEN. Until
      # then these steps skip and the release ships the unsigned installer.
      # See the README "Code signing policy" section.
      - name: Upload unsigned installer (for SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: unsigned-installer
        uses: actions/upload-artifact@v6
        with:
          name: octo-setup-unsigned
          path: staging\octo-setup.exe

      - name: Sign installer (SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Swap in the signed installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: pwsh
        run: Copy-Item signed\octo-setup.exe staging\octo-setup.exe -Force

      - name: Attach installer to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ github.ref_name }}" staging\octo-setup.exe --clobber

  # Build the double-click macOS installer (octo-setup.pkg) from the universal
  # (amd64+arm64) binary goreleaser just published, and attach it to the same
  # release. One .pkg covers both Intel and Apple Silicon. Unsigned for now —
  # see the README "Install" section for the Gatekeeper bypass this implies.
  macos-installer:
    name: macos installer
    needs: goreleaser
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5 # for packaging/macos/ + LICENSE.txt

      - uses: actions/setup-go@v6 # build.sh builds the desktop app from source
        with:
          go-version: '1.25'
          cache-dependency-path: cmd/octo-desktop/go.sum

      - name: Stage the released binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p staging dl
          gh release download "$GITHUB_REF_NAME" --pattern "octo_${version}_darwin_all.tar.gz" --dir dl
          tar -xzf "dl/octo_${version}_darwin_all.tar.gz" -C dl octo
          cp dl/octo staging/octo
          cp LICENSE.txt staging/LICENSE.txt
          echo "version=$version" >> "$GITHUB_ENV"

      # Fetches uv (universal amd64+arm64 binary, lipo'd together) from its
      # upstream GitHub release (pinned version in the Makefile) so build.sh
      # can bundle it into the pkg payload — see
      # packaging/macos/scripts/postinstall for where it lands at install
      # time.
      - name: Fetch bundled uv
        run: make bundle-tools-macos

      - name: Copy bundled tools into the installer staging dir
        run: cp dist/bundled-tools/darwin-universal/uv staging/uv

      - name: Build installer
        env:
          AppVersion: ${{ env.version }}
          SourceDir: ${{ github.workspace }}/staging
          OutDir: ${{ github.workspace }}/staging
        run: packaging/macos/build.sh

      - name: Attach installer to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" staging/octo-setup.pkg --clobber

  # Build the Linux desktop AppImage (Octo-x86_64.AppImage) and attach it. The
  # AppImage is the GUI + bundled uv; GTK4/WebKitGTK 6.0 come from the host (the
  # AppRun launcher preflights them). Linux CLI users keep using the tarball.
  linux-appimage:
    name: linux appimage
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: cmd/octo-desktop/go.sum

      - name: Install webview deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev

      - name: Fetch bundled uv
        run: |
          uvVersion=0.11.26
          mkdir -p dl
          curl -fsSL -o dl/uv.tar.gz "https://github.com/astral-sh/uv/releases/download/$uvVersion/uv-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf dl/uv.tar.gz -C dl
          echo "UV_BINARY=$PWD/dl/uv-x86_64-unknown-linux-gnu/uv" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: bash scripts/package-desktop-linux.sh

      - name: Attach AppImage to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" Octo-x86_64.AppImage --clobber
