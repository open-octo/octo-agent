<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#1c1c1e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Stylized "C" claw / lightning mark -->
  <!-- Two arcs forming a C with a cut, suggesting speed/AI -->
  <g transform="translate(50,50)">
    <!-- Outer arc of C -->
    <path d="M 8,-22
             A 24,24 0 1 0 8,22
             L 4,14
             A 16,16 0 1 1 4,-14
             Z"
          fill="white" opacity="0.95"/>
    <!-- Inner dot / eye -->
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.95"/>
  </g>
</svg>
