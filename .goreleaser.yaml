# goreleaser config — builds the `octo` binary for every supported platform
# and publishes a GitHub Release on every `v*` tag push (.github/workflows/release.yml).
#
# octo is pure Go (no cgo: the sandbox uses build-tagged syscalls, not C), so a
# single Linux runner cross-compiles every target with CGO_ENABLED=0.
#
# Validate locally without releasing:
#   goreleaser check
#   goreleaser release --snapshot --clean   # builds dist/ but doesn't publish
version: 2

project_name: octo

# ripgrep release bundled into every binary (see internal/tools/rgembed). Keep
# in sync with RG_VERSION in the Makefile — this value drives both the per-target
# download hook below and the rgembed.version ldflag.
env:
  - RG_VERSION=15.1.0

before:
  hooks:
    - go mod download

builds:
  - id: octo
    main: ./cmd/octo
    binary: octo
    env:
      - CGO_ENABLED=0
    # Each target downloads the matching ripgrep before building so the grep
    # tool works out of the box without rg on PATH. The hook writes a single
    # shared file (internal/tools/rgembed/binaries/rg), so builds MUST run
    # serially — release.yml passes `-p 1`; without it, parallel targets would
    # embed each other's rg. rg-embed-clean forces a fresh download per target
    # (the file target is otherwise a no-op once present).
    hooks:
      pre:
        - cmd: make rg-embed-clean rg-embed RG_VERSION={{ .Env.RG_VERSION }}
          env:
            - GOOS={{ .Os }}
            - GOARCH={{ .Arch }}
    flags:
      - -trimpath
    # embedrg bakes the downloaded ripgrep into the binary (go:embed).
    tags:
      - embedrg
    # -s -w strip the symbol table + DWARF (smaller binary). Version/Commit are
    # the same -ldflags the Makefile injects, so `octo version` reports the tag
    # and the build's short SHA. rgembed.version names the extracted rg cache
    # file so an octo upgrade re-extracts a fresh binary.
    ldflags:
      - -s -w
      - -X github.com/open-octo/octo-agent/internal/version.Version={{ .Version }}
      - -X github.com/open-octo/octo-agent/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/open-octo/octo-agent/internal/tools/rgembed.version={{ .Env.RG_VERSION }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

# A fat darwin/all binary (lipo of amd64+arm64) alongside the per-arch ones,
# so the macOS .pkg installer can ship one download that runs natively on both
# Intel and Apple Silicon. replace: false keeps the per-arch darwin archives
# too — install.sh and manual downloads still need octo_<ver>_darwin_<arch>.tar.gz.
universal_binaries:
  - id: octo
    replace: false

archives:
  - id: octo
    # tar.gz everywhere except Windows, which gets a zip.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - README_EN.md
      - LICENSE.txt
      # Windows double-click launcher: opens PowerShell with octo on PATH and
      # starts a session. Harmless in the tar.gz archives; meant for the zip.
      - packaging/windows/start-octo.cmd

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  # Group the autogenerated notes by conventional-commit prefix and drop the
  # noise. This is the only changelog octo ships — a hand-curated CHANGELOG.md
  # existed through 1.7.2, went stale, and was removed; the GitHub Releases
  # page (this) is now the canonical changelog.
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: open-octo
    name: octo-agent
  # Mark -dev / -rc / -beta tags as pre-releases automatically.
  prerelease: auto
