# goreleaser config — builds the `octo` binary for every supported platform
# and publishes a GitHub Release on every `v*` tag push (.github/workflows/release.yml).
#
# octo is pure Go (no cgo: the sandbox uses build-tagged syscalls, not C), so a
# single Linux runner cross-compiles every target with CGO_ENABLED=0.
#
# Validate locally without releasing:
#   goreleaser check
#   goreleaser release --snapshot --clean   # builds dist/ but doesn't publish
version: 2

project_name: octo

before:
  hooks:
    - go mod download

builds:
  - id: octo
    main: ./cmd/octo
    binary: octo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # -s -w strip the symbol table + DWARF (smaller binary). Version/Commit are
    # the same -ldflags the Makefile injects, so `octo version` reports the tag
    # and the build's short SHA.
    ldflags:
      - -s -w
      - -X github.com/Leihb/octo-agent/internal/version.Version={{ .Version }}
      - -X github.com/Leihb/octo-agent/internal/version.Commit={{ .ShortCommit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: octo
    # tar.gz everywhere except Windows, which gets a zip.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - README_CN.md
      - LICENSE.txt
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  # Group the autogenerated notes by conventional-commit prefix and drop the
  # noise. The curated CHANGELOG.md remains the canonical record (linked in the
  # release footer); this is just the per-release commit digest.
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: Leihb
    name: octo-agent
  # Mark -dev / -rc / -beta tags as pre-releases automatically.
  prerelease: auto
  footer: |
    ---
    Full, curated changelog: [CHANGELOG.md](https://github.com/Leihb/octo-agent/blob/main/CHANGELOG.md)
